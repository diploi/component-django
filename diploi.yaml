diploiVersion: v1.0
type: component
name: Django
description: Official Diploi component for Django

supportsAdditionalHosts: { serviceName: 'app'}

hosts:
  - name: Django
    identifier: app
    port: 8000

parameterGroups:
  - name: Secret Key
    identifier: secret_key
    description: Django Secret Key
    parameters:
      - name: Secret Key
        identifier: SECRET_KEY
        defaultValue: '${generate-random-password:50}'
        type: secret

images:
  - identifier: app
    prebuildImage: public.ecr.aws/p8t2q7f4/diploi/component-django:[tag]
